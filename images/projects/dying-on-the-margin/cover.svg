<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Dying on the Margin cover</title>
  <desc id="desc">Abstract cover showing hospital capacity utilization and mortality risk modeling.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="55%" stop-color="#0a1424"/>
      <stop offset="100%" stop-color="#08121b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3bc8ff"/>
      <stop offset="100%" stop-color="#7ea2ff"/>
    </linearGradient>
    <linearGradient id="mint" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60e5bf"/>
      <stop offset="100%" stop-color="#3bc8ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="250" cy="180" r="240" fill="#3bc8ff" opacity="0.08"/>
  <circle cx="1390" cy="240" r="220" fill="#7ea2ff" opacity="0.08"/>
  <circle cx="1320" cy="780" r="290" fill="#60e5bf" opacity="0.07"/>

  <rect x="74" y="72" width="1452" height="756" rx="30" fill="none" stroke="rgba(126,162,255,0.18)"/>
  <rect x="94" y="92" width="804" height="716" rx="28" fill="rgba(10,18,32,0.78)" stroke="rgba(96,229,191,0.14)"/>
  <rect x="930" y="92" width="576" height="716" rx="28" fill="rgba(10,18,32,0.64)" stroke="rgba(59,200,255,0.16)"/>

  <text x="146" y="188" fill="#7ea2ff" font-size="24" font-family="JetBrains Mono, monospace" letter-spacing="3">CAPACITY AND OUTCOMES MODELING</text>
  <text x="146" y="278" fill="#e8f0ff" font-size="72" font-weight="800" font-family="Plus Jakarta Sans, Arial, sans-serif">Dying on the Margin</text>
  <text x="146" y="352" fill="#e8f0ff" font-size="58" font-weight="800" font-family="Plus Jakarta Sans, Arial, sans-serif">Hospital Capacity Utilization and Mortality</text>
  <text x="146" y="426" fill="#b9c8df" font-size="29" font-family="Manrope, Arial, sans-serif">Regression analysis of occupancy, rural context, bed size,</text>
  <text x="146" y="468" fill="#b9c8df" font-size="29" font-family="Manrope, Arial, sans-serif">and risk-adjusted heart-failure mortality.</text>

  <rect x="146" y="554" width="316" height="152" rx="22" fill="rgba(59,200,255,0.08)" stroke="rgba(59,200,255,0.24)"/>
  <text x="182" y="607" fill="#9acfff" font-size="18" font-family="JetBrains Mono, monospace" letter-spacing="2">PRIMARY SIGNAL</text>
  <text x="182" y="668" fill="#ffffff" font-size="64" font-weight="800" font-family="Plus Jakarta Sans, Arial, sans-serif" filter="url(#glow)">p &lt; 0.001</text>
  <text x="182" y="710" fill="#b9c8df" font-size="22" font-family="Manrope, Arial, sans-serif">occupancy relationship in the core models</text>

  <rect x="492" y="554" width="332" height="152" rx="22" fill="rgba(126,162,255,0.08)" stroke="rgba(126,162,255,0.24)"/>
  <text x="528" y="607" fill="#bcc8ff" font-size="18" font-family="JetBrains Mono, monospace" letter-spacing="2">MODEL SHAPE</text>
  <text x="528" y="664" fill="#ffffff" font-size="46" font-weight="800" font-family="Plus Jakarta Sans, Arial, sans-serif">Quadratic fit</text>
  <text x="528" y="709" fill="#b9c8df" font-size="22" font-family="Manrope, Arial, sans-serif">nonlinearity matters when thresholds appear</text>

  <rect x="970" y="160" width="496" height="250" rx="24" fill="rgba(8,14,24,0.86)" stroke="rgba(59,200,255,0.18)"/>
  <text x="1016" y="214" fill="#9acfff" font-size="18" font-family="JetBrains Mono, monospace" letter-spacing="2">UTILIZATION AND RISK CURVE</text>
  <line x1="1038" y1="360" x2="1412" y2="360" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
  <line x1="1038" y1="236" x2="1038" y2="360" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
  <path d="M1056 278 C1140 236, 1210 224, 1274 248 S1362 316, 1412 340" fill="none" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round"/>
  <path d="M1056 308 C1134 284, 1224 282, 1310 318" fill="none" stroke="rgba(96,229,191,0.65)" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 10"/>

  <rect x="970" y="450" width="496" height="252" rx="24" fill="rgba(8,14,24,0.86)" stroke="rgba(96,229,191,0.18)"/>
  <text x="1016" y="504" fill="#90ebcc" font-size="18" font-family="JetBrains Mono, monospace" letter-spacing="2">SYSTEM CONTEXT</text>
  <rect x="1028" y="558" width="114" height="96" rx="18" fill="rgba(126,162,255,0.12)" stroke="rgba(126,162,255,0.24)"/>
  <rect x="1170" y="532" width="114" height="122" rx="18" fill="rgba(59,200,255,0.12)" stroke="rgba(59,200,255,0.24)"/>
  <rect x="1312" y="506" width="114" height="148" rx="18" fill="rgba(96,229,191,0.14)" stroke="rgba(96,229,191,0.24)"/>
  <text x="1028" y="692" fill="#b9c8df" font-size="22" font-family="Manrope, Arial, sans-serif">Bed size, rural status, and capacity pressure change the story.</text>
</svg>
