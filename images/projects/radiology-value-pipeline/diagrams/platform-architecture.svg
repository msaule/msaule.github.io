<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
<defs><style>
.bg{fill:#f6f8fb}.box{fill:#fff;stroke:#cbd7e3;stroke-width:2;rx:18}.dark{fill:#17324d}.title{font:700 34px Segoe UI,Arial;fill:#102a43}.h{font:700 20px Segoe UI,Arial;fill:#17324d}.t{font:500 15px Segoe UI,Arial;fill:#44515f}.small{font:500 13px Segoe UI,Arial;fill:#607080}.arrow{stroke:#466581;stroke-width:3;fill:none;marker-end:url(#m)}.accent{fill:#e9f5f2;stroke:#2a9d8f}.warn{fill:#fff4e8;stroke:#d27b3f}.blue{fill:#eef3ff;stroke:#5b6ee1}
</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#466581"/></marker></defs>
<rect class="bg" width="1400" height="720"/>
<text class="title" x="60" y="70">Radiology Value Pipeline: Standards-Based Local MVP</text>
<text class="t" x="60" y="102">One FastAPI platform, one PostgreSQL operational backbone, one worker, and real baseline imaging models for chest X-ray and brain MRI.</text>
<rect class="box blue" x="60" y="155" width="230" height="120"/><text class="h" x="88" y="198">PACS / RIS / EHR</text><text class="t" x="88" y="228">Study metadata</text><text class="t" x="88" y="250">Order context</text>
<rect class="box blue" x="60" y="330" width="230" height="120"/><text class="h" x="88" y="373">Orthanc</text><text class="t" x="88" y="403">DICOMweb edge</text><text class="t" x="88" y="425">QIDO / WADO / STOW</text>
<rect class="box" x="370" y="235" width="240" height="160"/><text class="h" x="400" y="282">FastAPI Backend</text><text class="t" x="400" y="314">Study registration</text><text class="t" x="400" y="338">Review APIs</text><text class="t" x="400" y="362">Dashboard APIs</text>
<rect class="box warn" x="690" y="165" width="240" height="130"/><text class="h" x="720" y="208">PostgreSQL</text><text class="t" x="720" y="238">Metadata, lineage</text><text class="t" x="720" y="262">Audit, feedback, marts</text>
<rect class="box warn" x="690" y="345" width="240" height="130"/><text class="h" x="720" y="388">Artifacts</text><text class="t" x="720" y="418">Filesystem / MinIO</text><text class="t" x="720" y="442">Overlays, previews, PDFs</text>
<rect class="box accent" x="1010" y="135" width="270" height="150"/><text class="h" x="1040" y="178">DB-Backed Worker</text><text class="t" x="1040" y="210">FOR UPDATE SKIP LOCKED</text><text class="t" x="1040" y="234">Specialist model services</text><text class="t" x="1040" y="258">Workflow agents</text>
<rect class="box accent" x="1010" y="345" width="270" height="150"/><text class="h" x="1040" y="388">Dashboards</text><text class="t" x="1040" y="420">Power BI export package</text><text class="t" x="1040" y="444">Ops, quality, governance</text><text class="t" x="1040" y="468">Drift and model inventory</text>
<line class="arrow" x1="290" y1="215" x2="370" y2="290"/><line class="arrow" x1="290" y1="390" x2="370" y2="330"/><line class="arrow" x1="610" y1="295" x2="690" y2="230"/><line class="arrow" x1="610" y1="350" x2="690" y2="410"/><line class="arrow" x1="930" y1="230" x2="1010" y2="205"/><line class="arrow" x1="930" y1="230" x2="1010" y2="420"/><line class="arrow" x1="1145" y1="285" x2="1145" y2="345"/>
<rect class="box" x="370" y="515" width="910" height="105"/><text class="h" x="400" y="555">Human-in-the-loop safety posture</text><text class="t" x="400" y="586">AI produces structured candidates, evidence references, uncertainty, and draft text. The radiologist remains the author of record.</text>
</svg>