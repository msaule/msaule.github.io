project:
  type: website
  output-dir: docs
  resources:
    - enhancements.js
    - files/radiology-value-pipeline/**
    - files/mercury-market-sim/**
    - files/hospital-prices/**
    - files/dying-on-the-margin/**
  post-render:
    - powershell -ExecutionPolicy Bypass -File scripts/post-render.ps1
  render:
    - index.qmd
    - projects.qmd
    - resume.qmd
    - about.qmd
    - projects/*.qmd

website:
  title: "Markuss Saule"
  site-url: "https://msaule.github.io"
  favicon: images/favicon.svg
  navbar:
    left:
      - text: Home
        file: index.qmd
      - text: Projects
        file: projects.qmd
      - text: Resume
        file: resume.qmd
      - text: About
        file: about.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/markuss-saule/
      - icon: github
        href: https://github.com/msaule

format:
  html:
    theme: darkly
    css: styles.css
    include-after-body:
      - text: <script>(function(){var s=document.createElement('script');s.src=window.location.pathname.indexOf('/projects/')!==-1?'../enhancements.js':'enhancements.js';document.body.appendChild(s);}());</script>
    toc: false
    smooth-scroll: true

execute:
  enabled: false
